<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>纳溪竹雕 · 非遗数字文创全案</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* =====================
全局变量
===================== */

:root{
--bamboo:#1b4d3e;
--bamboo2:#3f6f5c;
--rice:#f5efe6;
--ink:#111;
--gold:#caa45b;
--red:#a21e1e;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:"Noto Serif SC",serif;
background:var(--rice);
color:var(--ink);
overflow-x:hidden;
line-height:1.7;
}

/* =====================
刻刀开场动画
===================== */

#opening{
position:fixed;
width:100%;
height:100%;
background:#efe8d6;
z-index:9999;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

#carveCanvas{
position:absolute;
top:0;
left:0;
}

.opening-title{
font-size:28px;
letter-spacing:6px;
color:var(--bamboo);
}

/* =====================
竹林多层视差
===================== */

.parallax{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

.layer{
position:absolute;
width:120%;
height:120%;
background-size:cover;
opacity:.2;
}

.layer1{
background:url("https://images.unsplash.com/photo-1598974357801-cbca100e65d3?auto=format&fit=crop&w=1600&q=60");
}

.layer2{
background:url("https://images.unsplash.com/photo-1597758893255-02f1b1db5c9d?auto=format&fit=crop&w=1600&q=60");
opacity:.15;
}

/* =====================
导航
===================== */

nav{
position:fixed;
top:0;
width:100%;
background:rgba(255,255,255,.9);
backdrop-filter:blur(6px);
display:flex;
justify-content:center;
z-index:1000;
}

nav ul{
display:flex;
gap:40px;
padding:14px;
list-style:none;
margin:0;
}

nav a{
text-decoration:none;
color:var(--ink);
font-weight:500;
position:relative;
}

nav a:after{
content:"";
position:absolute;
bottom:-6px;
left:0;
width:0;
height:2px;
background:var(--gold);
transition:.3s;
}

nav a:hover:after{width:100%}

/* =====================
封面
===================== */

.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:56px;
color:var(--bamboo);
letter-spacing:6px;
}

.seal{
border:3px solid var(--red);
padding:8px 16px;
color:var(--red);
margin-top:25px;
}

/* =====================
卷轴 section
===================== */

section{
padding:120px 12%;
max-width:1200px;
margin:auto;
position:relative;
}

.scroll-box{
background:#f3ead6;
border-left:10px solid var(--gold);
border-right:10px solid var(--gold);
padding:40px;
box-shadow:0 10px 40px rgba(0,0,0,.1);
}

.section-title{
font-size:36px;
color:var(--bamboo);
margin-bottom:30px;
}

/* =====================
卡片
===================== */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
transition:.4s;
}

.card:hover{
transform:translateY(-8px);
}

/* =====================
3D竹雕模型
===================== */

#model{
height:420px;
background:#e6dcc7;
border-radius:10px;
}

/* =====================
云刻竹
===================== */

#carve{
height:300px;
background:#d9caa2;
border-radius:10px;
position:relative;
}

#draw{
position:absolute;
top:0;
left:0;
}

/* =====================
竹节进度条
===================== */

.progress{
width:100%;
height:20px;
background:#ddd;
border-radius:20px;
overflow:hidden;
margin-top:20px;
}

.progress-bar{
height:100%;
width:0;
background:linear-gradient(90deg,var(--bamboo),var(--gold));
}

/* =====================
区块链节点
===================== */

#network{
height:320px;
background:#0d0f16;
border-radius:10px;
}

/* =====================
返回顶部
===================== */

#top{
position:fixed;
right:20px;
bottom:20px;
padding:12px 16px;
background:var(--bamboo);
color:white;
border:none;
display:none;
}

/* =====================
响应式
===================== */

@media(max-width:900px){
.hero h1{font-size:36px}
section{padding:80px 8%}
}

</style>
</head>

<body>

<!-- 开场 -->
<div id="opening">
<canvas id="carveCanvas"></canvas>
<div class="opening-title">纳溪竹雕 · 千年刻竹</div>
</div>

<!-- 背景 -->
<div class="parallax">
<div class="layer layer1"></div>
<div class="layer layer2"></div>
</div>

<nav>
<ul>
<li><a href="#intro">背景</a></li>
<li><a href="#product">产品</a></li>
<li><a href="#model3d">3D竹雕</a></li>
<li><a href="#carving">云刻竹</a></li>
<li><a href="#chain">区块链</a></li>
</ul>
</nav>

<div class="hero">
<h1>纳溪竹雕数字文创</h1>
<p>融合传统竹雕工艺与数字技术的非遗创新项目</p>
<div class="seal">纳溪竹雕</div>
</div>

<section id="intro">
<div class="scroll-box">
<h2 class="section-title">项目背景</h2>
<p>纳溪竹雕是四川省级非物质文化遗产，以细腻刀法和复杂纹样著称。通过数字技术赋能，可实现文化传播与商业创新。</p>
</div>
</section>

<section id="product">
<div class="scroll-box">
<h2 class="section-title">核心产品</h2>
<div class="grid">

<div class="card">
<h3>数字孤品身份证</h3>
<p>区块链存证 + 作品溯源</p>
</div>

<div class="card">
<h3>竹雕盲盒</h3>
<p>数字纹样随机生成</p>
</div>

<div class="card">
<h3>AR雕刻体验</h3>
<p>沉浸式竹雕制作</p>
</div>

</div>

<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>

</div>
</section>

<section id="model3d">
<div class="scroll-box">
<h2 class="section-title">3D竹雕模型</h2>
<div id="model"></div>
</div>
</section>

<section id="carving">
<div class="scroll-box">
<h2 class="section-title">云刻竹互动</h2>
<div id="carve">
<canvas id="draw"></canvas>
</div>
</div>
</section>

<section id="chain">
<div class="scroll-box">
<h2 class="section-title">区块链溯源网络</h2>
<canvas id="network"></canvas>
</div>
</section>

<button id="top">↑</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* =====================
刻刀开场
===================== */

const oc=document.getElementById("carveCanvas")
const ctx=oc.getContext("2d")

oc.width=window.innerWidth
oc.height=window.innerHeight

let x=0

let carveAnim=setInterval(()=>{

ctx.strokeStyle="#3b2a16"
ctx.lineWidth=2

ctx.beginPath()
ctx.moveTo(x,200)
ctx.lineTo(x+10,210)
ctx.stroke()

x+=8

if(x>window.innerWidth){
clearInterval(carveAnim)
setTimeout(()=>document.getElementById("opening").style.display="none",800)
}

},30)

/* =====================
竹林视差
===================== */

window.addEventListener("scroll",()=>{

document.querySelector(".layer1").style.transform=
`translateY(${window.scrollY*0.2}px)`

document.querySelector(".layer2").style.transform=
`translateY(${window.scrollY*0.4}px)`

})

/* =====================
3D竹雕
===================== */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(45,1,0.1,1000)

const renderer=new THREE.WebGLRenderer()

renderer.setSize(400,400)

document.getElementById("model").appendChild(renderer.domElement)

const geometry=new THREE.CylinderGeometry(1,1,4,32)

const material=new THREE.MeshPhongMaterial({color:0x8b5a2b})

const bamboo=new THREE.Mesh(geometry,material)

scene.add(bamboo)

camera.position.z=6

const light=new THREE.PointLight(0xffffff,1)
light.position.set(5,5,5)
scene.add(light)

function animate(){
requestAnimationFrame(animate)
bamboo.rotation.y+=0.01
renderer.render(scene,camera)
}

animate()

/* =====================
云刻竹
===================== */

const draw=document.getElementById("draw")
const dctx=draw.getContext("2d")

draw.width=document.getElementById("carve").clientWidth
draw.height=300

draw.addEventListener("mousemove",e=>{
if(e.buttons==1){

dctx.fillStyle="#3d2b17"
dctx.beginPath()
dctx.arc(e.offsetX,e.offsetY,1,0,Math.PI*2)
dctx.fill()

}
})

/* =====================
竹节进度
===================== */

let p=0
let bar=document.getElementById("progress")

setInterval(()=>{
if(p<100){
p+=1
bar.style.width=p+"%"
}
},80)

/* =====================
区块链网络
===================== */

const net=document.getElementById("network")
const nctx=net.getContext("2d")

net.width=net.clientWidth
net.height=320

let nodes=[]

for(let i=0;i<25;i++){
nodes.push({
x:Math.random()*net.width,
y:Math.random()*net.height
})
}

function drawNet(){

nctx.clearRect(0,0,net.width,net.height)

nodes.forEach(a=>{
nodes.forEach(b=>{

let d=Math.hypot(a.x-b.x,a.y-b.y)

if(d<120){

nctx.strokeStyle="rgba(200,170,90,0.3)"
nctx.beginPath()
nctx.moveTo(a.x,a.y)
nctx.lineTo(b.x,b.y)
nctx.stroke()

}

})
})

nodes.forEach(n=>{

nctx.fillStyle="#ffd66e"
nctx.beginPath()
nctx.arc(n.x,n.y,3,0,Math.PI*2)
nctx.fill()

})

requestAnimationFrame(drawNet)

}

drawNet()

/* =====================
返回顶部
===================== */

let btn=document.getElementById("top")

window.onscroll=()=>{
btn.style.display=window.scrollY>600?"block":"none"
}

btn.onclick=()=>window.scrollTo({top:0,behavior:"smooth"})

</script>

</body>
</html>
